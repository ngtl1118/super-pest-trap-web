<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pest Trap - Enterprise Command Center</title>
    <style>
        /* ALL ORIGINAL STYLES PRESERVED */
        :root {
            --bg-main: #0a0a0c; --bg-card: #141416; --bg-input: #1e1e22;
            --bg-accent-glow: rgba(76, 175, 80, 0.08); --text-pure: #ffffff;
            --text-secondary: #94949c; --brand-green: #4caf50;
            --border-subtle: #26262a; --blue-accent: #2196f3;
            --gold-premium: #ffb300; --alert-red: #ef5350; --purple-ai: #9c27b0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-main); color: var(--text-pure); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .dashboard-container { background-color: var(--bg-card); width: 100%; max-width: 1200px; border-radius: 24px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8); border: 1px solid var(--border-subtle); overflow: hidden; position: relative; }
        .dashboard-header { background-color: #0d0d0f; border-bottom: 1px solid var(--border-subtle); padding: 20px 32px; display: flex; flex-direction: column; gap: 16px; }
        .header-top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .header-nav-row { display: flex; justify-content: flex-start; width: 100%; border-top: 1px solid #1a1a1f; padding-top: 14px; }
        .brand-logo { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .brand-logo span { color: var(--brand-green); }
        .tier-switcher-wrapper { display: flex; align-items: center; background-color: #16161a; padding: 4px; border-radius: 10px; border: 1px solid var(--border-subtle); gap: 4px; }
        .tier-toggle-btn { background: none; border: none; padding: 8px 14px; font-size: 11px; font-weight: 700; color: var(--text-secondary); cursor: pointer; border-radius: 6px; transition: all 0.2s ease; text-transform: uppercase; white-space: nowrap; }
        .tier-toggle-btn.active.basic { background-color: #333; color: var(--text-pure); }
        .tab-menu { display: flex; background-color: #16161a; padding: 4px; border-radius: 12px; border: 1px solid var(--border-subtle); gap: 4px; width: 100%; overflow-x: auto; }
        .tab-btn { background: none; border: none; padding: 10px 18px; font-size: 11px; font-weight: 700; color: var(--text-secondary); cursor: pointer; border-radius: 8px; transition: all 0.2s ease; text-transform: uppercase; white-space: nowrap; }
        .tab-btn:hover { color: var(--text-pure); background-color: rgba(255, 255, 255, 0.02); }
        .tab-btn.active { background-color: var(--bg-input); color: var(--brand-green); }
        .panel-content { padding: 40px; display: none; }
        .panel-content.active { display: block; }
        .grid-two-column { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 40px; }
        .system-title { font-size: 24px; font-weight: 700; margin: 0 0 8px 0; }
        .system-desc { font-size: 14px; color: var(--text-secondary); margin: 0 0 32px 0; }
        .section-label { font-size: 11px; font-weight: 700; color: var(--brand-green); text-transform: uppercase; margin-bottom: 12px; }
        .report-print-box { background-color: #1c1c21; border: 1px solid #333; border-radius: 14px; padding: 32px; margin-top: 16px; }
        .sub-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }
        .btn-premium { background-color: var(--gold-premium); color: #000000; }
        .custom-select { width: 100%; padding: 16px; font-size: 14px; color: var(--text-pure); border: 1px solid var(--border-subtle); border-radius: 12px; background-color: var(--bg-input); }
    </style>
</head>
<body onload="syncLocationProfile()">

<div class="dashboard-container basic-mode" id="masterDashboardWrapper">
    <div class="dashboard-header">
        <div class="header-top-row">
            <div class="brand-logo">🛡️ Super Pest Trap <span>Console</span></div>
            <div class="tier-switcher-wrapper">
                <button class="tier-toggle-btn active basic" onclick="changeAccountTier('basic')">Standard</button>
                <button class="tier-toggle-btn premium" onclick="changeAccountTier('premium')">💎 Premium Pro</button>
            </div>
        </div>
        <div class="header-nav-row">
            <div class="tab-menu">
                <button class="tab-btn active" onclick="openPanel(event, 'scent-panel')">🌿 Scent & AI</button>
                <button class="tab-btn" onclick="openPanel(event, 'battery-panel')">🔋 Logis & Power</button>
                <button class="tab-btn" onclick="openPanel(event, 'cloud-panel')">👁️ Live Cloud</button>
                <button class="tab-btn" onclick="openPanel(event, 'repair-panel')">🔧 Service & Repair</button>
                <button class="tab-btn premium-tab" onclick="openPanel(event, 'report-panel')">📊 Audit Report</button>
                <button class="tab-btn" onclick="openPanel(event, 'order-panel')">🛒 Order Products</button>
                <button class="tab-btn" onclick="openPanel(event, 'sub-panel')">💎 Subscription</button>
            </div>
        </div>
    </div>

    <!-- Scent Panel -->
    <div id="scent-panel" class="panel-content active">
        <h3 class="system-title">Organic Scent & AI Recognition Matrix</h3>
        <!-- (Your original scent content would be here) -->
    </div>

    <!-- NEW REPAIR PANEL -->
    <div id="repair-panel" class="panel-content">
        <h3 class="system-title">Service & Maintenance Request</h3>
        <p class="system-desc">Request expert assistance for hardware failure, software calibration, or battery replacement.</p>
        <div class="grid-two-column">
            <div class="report-print-box">
                <div class="section-label">Create Maintenance Ticket</div>
                <select class="custom-select" id="faultyComponent" style="margin-bottom: 20px;">
                    <option value="Camera">Vision Sensor / Camera Module</option>
                    <option value="Battery">Power / Battery Unit</option>
                    <option value="Software">System / Software Glitch</option>
                    <option value="Other">Other / Miscellaneous</option>
                </select>
                <textarea id="issueDescription" style="width: 100%; height: 100px; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px; color: var(--text-pure); margin-bottom: 16px;" placeholder="Describe the issue in detail..."></textarea>
                <button class="sub-btn btn-premium" onclick="submitRepairTicket()">🚀 Submit Maintenance Ticket</button>
            </div>
            <div id="repairStatusList">
                <div class="report-print-box" style="padding: 20px;">
                    <div class="section-label">Service History</div>
                    <div id="repairItemsContainer"><p style="color: var(--text-secondary);">No active tickets.</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- (Place your other original panels here: battery, cloud, report, order, sub) -->
</div>

<script>
    // Include all your original logic here...
    function openPanel(e, id) {
        document.querySelectorAll('.panel-content').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
    }

    // New Maintenance Logic
    function submitRepairTicket() {
        const component = document.getElementById("faultyComponent").value;
        const desc = document.getElementById("issueDescription").value;
        if (!desc) { alert("Please describe the issue."); return; }
        
        const container = document.getElementById("repairItemsContainer");
        if (container.querySelector('p')) container.innerHTML = '';
        
        const div = document.createElement("div");
        div.style.background = "#26262a";
        div.style.padding = "10px";
        div.style.borderRadius = "8px";
        div.style.marginBottom = "10px";
        div.innerHTML = `<div style="font-size: 11px; font-weight: 700; color: var(--brand-green);">SUBMITTED: ${component}</div>
                         <div style="font-size: 13px; color: var(--text-pure); margin-top: 5px;">${desc}</div>`;
        container.prepend(div);
        document.getElementById("issueDescription").value = "";
        alert("Maintenance ticket submitted successfully!");
    }
    
    // (Ensure your original functions follow here)
</script>
</body>
</html>
