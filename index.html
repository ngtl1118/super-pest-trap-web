<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pest Trap - Enterprise Command Center</title>
    <!-- [Keep all your existing styles exactly as they are] -->
    <style>
        :root {
            --bg-main: #0a0a0c; --bg-card: #141416; --bg-input: #1e1e22; --text-pure: #ffffff;
            --text-secondary: #94949c; --brand-green: #4caf50; --border-subtle: #26262a;
            --blue-accent: #2196f3; --gold-premium: #ffb300; --alert-red: #ef5350; --purple-ai: #9c27b0;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-main); color: var(--text-pure); margin: 0; padding: 20px; }
        .dashboard-container { background-color: var(--bg-card); width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 24px; border: 1px solid var(--border-subtle); overflow: hidden; }
        .panel-content { padding: 40px; display: none; }
        .panel-content.active { display: block; }
        /* Maintenance Form Styles */
        .maintenance-panel { background-color: #1a1a1f; border-radius: 16px; padding: 32px; margin-top: 32px; border: 1px solid var(--border-subtle); }
        .maint-input { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 8px; color: #fff; margin-bottom: 10px; }
        .sub-btn { width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-premium { background-color: var(--gold-premium); color: #000; }
    </style>
</head>
<body>

<div class="dashboard-container" id="masterDashboardWrapper">
    <!-- [Your existing Header structure remains here] -->

    <!-- Order & Maintenance Panel -->
    <div id="order-panel" class="panel-content">
        <h3>🛒 Order Products</h3>
        <!-- [Your existing Store Product Grid & Checkout code remains here] -->

        <!-- ADDED MAINTENANCE FEATURE -->
        <div class="maintenance-panel">
            <h3 style="margin-top:0;">🛠️ Maintenance & Repair Booking</h3>
            <p>Book a technician for battery replacement or software errors.</p>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label>Repair Category</label>
                    <select class="maint-input" id="maintCategory">
                        <option value="General">General Maintenance</option>
                        <option value="Battery">Battery Failure / Power Issue</option>
                        <option value="Software">Software Error / Connectivity</option>
                    </select>
                    <label>Preferred Date</label>
                    <input type="date" class="maint-input" id="maintDate">
                </div>
                <div>
                    <label>Site Address</label>
                    <textarea class="maint-input" id="maintAddress" rows="4" placeholder="Enter your full site address..."></textarea>
                    <button class="sub-btn btn-premium" onclick="dispatchMaintenanceRequest()">Submit Repair Booking</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- [Keep your existing Scent, Cloud, Report, Subscription, Support panels below] -->
</div>

<script>
    // New function for maintenance booking
    function dispatchMaintenanceRequest() {
        const cat = document.getElementById("maintCategory").value;
        const date = document.getElementById("maintDate").value;
        const addr = document.getElementById("maintAddress").value;

        if (!date || !addr) {
            alert("Please provide both a service date and your site address.");
            return;
        }
        alert("Maintenance Request Submitted! An expert technician has been scheduled for " + date + " regarding " + cat + " issues at: " + addr);
        
        // Clear fields
        document.getElementById("maintDate").value = "";
        document.getElementById("maintAddress").value = "";
    }

    // [Keep your existing panel logic and other functions here]
</script>
</body>
</html>
