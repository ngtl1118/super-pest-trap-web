<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Pest Trap - Enterprise Command Center</title>
    <style>
        /* ... [Keep all previous styles] ... */

        /* Maintenance Booking specific styles */
        .maintenance-panel { background-color: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px; margin-top: 32px; }
        .maint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .maint-input { width: 100%; padding: 16px; background-color: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 12px; color: var(--text-pure); box-sizing: border-box; margin-bottom: 16px; }
    </style>
</head>
<body onload="syncLocationProfile()">

<!-- ... [Keep the rest of the HTML structure until Order Panel] ... -->

    <!-- PANEL 5: PROCUREMENT & MAINTENANCE BOOKING -->
    <div id="order-panel" class="panel-content">
        <!-- Store Content -->
        <h3 class="system-title">Hardware Fleet & Organic Scent Supply Store</h3>
        <!-- ... [Keep Store Product Grid & Checkout Footer] ... -->
        
        <!-- NEW: MAINTENANCE & REPAIR BOOKING SECTION -->
        <div class="maintenance-panel">
            <h3 class="system-title" style="font-size: 20px;">🛠️ Request Expert Maintenance & Repair</h3>
            <p class="system-desc">Facing technical issues? Book a certified technician for on-site battery replacement or software diagnostic repairs.</p>
            
            <div class="maint-grid">
                <div>
                    <div class="section-label">Repair Category</div>
                    <select class="custom-select" id="maintCategory">
                        <option value="General">General Maintenance / Cleaning</option>
                        <option value="Battery">Battery Failure / Power Issue</option>
                        <option value="Software">Software Error / Connectivity</option>
                    </select>

                    <div class="section-label" style="margin-top:16px;">Service Date</div>
                    <input type="date" class="maint-input" id="maintDate">
                </div>
                <div>
                    <div class="section-label">Site Address</div>
                    <textarea class="maint-input" id="maintAddress" rows="4" placeholder="Enter full address for on-site technician..."></textarea>
                    
                    <button class="sub-btn btn-premium" style="width: 100%; padding: 16px;" onclick="dispatchMaintenanceRequest()">📅 Book Repair Appointment</button>
                </div>
            </div>
        </div>
    </div>

<!-- ... [Rest of the file] ... -->

<script>
    // ... [Keep existing scripts] ...

    function dispatchMaintenanceRequest() {
        const category = document.getElementById("maintCategory").value;
        const date = document.getElementById("maintDate").value;
        const address = document.getElementById("maintAddress").value;

        if (!date || !address) {
            alert("Please provide both a service date and your site address.");
            return;
        }

        alert("Maintenance Request Submitted! An expert technician has been scheduled for " + date + " regarding " + category + " issues at your location. Dispatch notification sent.");
        
        document.getElementById("maintDate").value = "";
        document.getElementById("maintAddress").value = "";
    }
</script>

</body>
</html>
